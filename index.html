<!DOCTYPE html>
<html lang="id">
<head>
    <title>C🎱ERAVAN</title>
    <link rel="icon" type="image/png" href="8.png?v=2">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* --- STYLE DASAR --- */
        body { 
            background-color: #000000; 
            background-image: url('c.jpeg'); 
            background-position: center;
            background-repeat: repeat; 
            background-attachment: fixed;
            background-size: auto; 
            font-family: 'Segoe UI', sans-serif; 
            padding-top: 30px; 
            margin: 0;
        }

        .card { 
            border: none; 
            border-radius: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            background-color: rgba(255, 255, 255, 0.7) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .form-label { font-weight: 600; color: #333; }
        .btn-wa { background: #25d366; border: none; color: white; font-weight: bold; padding: 12px; font-size: 1.1rem; }
        .btn-wa:hover { background: #128c7e; color: white; }
        .price-display { background: #e7f3ff; border: 1px solid #b2d7ff; border-radius: 10px; padding: 15px; margin-top: 20px; }
        #loading { display: none; }

        /* --- STYLE GAMBAR POP-UP DENGAN ANIMASI PITA & CAHAYA --- */
        .food-trigger {
            position: fixed;
            top: 18%;     /* Menyesuaikan posisi lingkaran biru */
            right: 5%;    /* Menyesuaikan posisi lingkaran biru */
            width: 100px;
            cursor: pointer;
            z-index: 1000;
	/* Pastikan background div transparan */
    	background: transparent !important; 
    	border: none !important;
            /* Animasi Mengambang & Cahaya */
            animation: floating 2.5s infinite ease-in-out, glowing 1.5s infinite alternate;
            transition: transform 0.3s ease;
        }

        .food-trigger img {
            width: 100%;
            height: auto;
            border-radius: 50%;
            border: 4px solid #ffcc00; /* Pinggiran emas */
        }

        /* Label Pita NEW */
        .food-trigger::after {
            content: "NEW!";
            position: absolute;
            top: -5px;
            right: -10px;
            background: #ff0000;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 10px;
            transform: rotate(15deg);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* Animasi Mengambang */
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Animasi Cahaya Berdenyut */
        @keyframes glowing {
            from { box-shadow: 0 0 10px #ffcc00, 0 0 20px #ffcc00; }
            to { box-shadow: 0 0 25px #fff, 0 0 35px #ffcc00; }
        }

        /* Animasi Emoji Berputar */
        @keyframes rotateEmoji {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(20deg) scale(1.3); }
            100% { transform: rotate(0deg) scale(1); }
        }

        .party-emoji {
            position: absolute;
            font-size: 22px;
            pointer-events: none;
        }

        /* --- STYLE MODAL NOTIFIKASI (OVERLAY GELAP) --- */
        .notif-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(8px);
        }

        .notif-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

    </style>
</head>
<body>

<!-- MODAL NOTIFIKASI -->
<div id="notifOverlay" class="notif-overlay">
    <div class="notif-box">
        <h4 class="text-primary fw-bold">🍱 C🎱ERA-FOOD 🍱</h4>
        <p class="mt-3">Mohon maaf, layanan pesanan makanan sedang dalam <br><strong>masa pengembangan</strong> oleh tim kami.</p>
        <hr>
        <button onclick="tutupNotif()" class="btn btn-primary w-100 fw-bold py-2">OKE, MENGERTI</button>
    </div>
</div>

<!-- GAMBAR POP-UP TRIGGER (DENGAN HIASAN PESTA) -->
<div class="food-trigger" id="foodBtn">
    <!-- Emoji melayang di sekitar gambar -->
    <span class="party-emoji" style="top: -20px; left: -10px; animation: rotateEmoji 2s infinite;">✨</span>
    <span class="party-emoji" style="bottom: -10px; right: -5px; animation: rotateEmoji 3s infinite;">🎉</span>
    <span class="party-emoji" style="top: 40%; left: -25px; animation: rotateEmoji 2.5s infinite;">🎊</span>
    
    <!-- Ganti 'food.png' dengan file gambar kamu sendiri -->
    <img src="f1.png" alt="Food Icon">
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3 class="text-center mb-4 text-primary">🖨️ C🎱ERA-PRINT 🖨️</h3>
                
                <div class="mb-3">
                    <label class="form-label">Kelas</label>
                    <select id="kelas" class="form-select" onchange="updateSiswa()">
                        <option value="">-- Pilih Kelas --</option>
                        <option value="10A">10A</option>
                        <option value="10B">10B</option>
                        <option value="10C">10C</option>
                        <option value="10D">10D</option>
                        <option value="10E">10E</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Nama Siswa</label>
                    <select id="nama" class="form-select" disabled>
                        <option value="">-- Pilih Kelas Terlebih Dahulu --</option>
                    </select>
                </div>

                <hr>

                <div class="mb-3">
                    <label class="form-label">Jenis Print</label>
                    <select id="jenis" class="form-select" onchange="hitungTotal()">
                        <option value="500">Hitam Putih (Rp 500/hal)</option>
                  	    <option value="500">Warna (Rp 500/hal)</option>
                    </select>
                </div>

                <div class="row mb-3">
                    <div class="col-6">
                        <label class="form-label">Jml Halaman</label>
                        <input type="number" id="hal" class="form-control" value="1" min="1" oninput="hitungTotal()">
                    </div>
                    <div class="col-6">
                        <label class="form-label">Jml Rangkap</label>
                        <input type="number" id="copy" class="form-control" value="1" min="1" oninput="hitungTotal()">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Unggah Dokumen</label>
                    <input type="file" id="fileInput" class="form-control">
                </div>

                <div class="price-display text-center">
                    <span class="text-muted small d-block">TOTAL PEMBAYARAN:</span>
                    <h2 class="text-primary fw-bold mb-0" id="totalTampilan">Rp 1.000</h2>
                </div>

                <button onclick="prosesOrder()" id="btnSubmit" class="btn btn-wa w-100 mt-4 shadow">
                    KONFIRMASI KE WA ADMIN
                </button>

                <div id="loading" class="mt-3 text-center">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 fw-bold">Sedang memproses file...</p>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    // FUNGSI UNTUK MODAL NOTIFIKASI
    const foodBtn = document.getElementById('foodBtn');
    const notifOverlay = document.getElementById('notifOverlay');

    foodBtn.addEventListener('click', () => {
        notifOverlay.style.display = 'flex';
    });

    function tutupNotif() {
        notifOverlay.style.display = 'none';
    }

    notifOverlay.addEventListener('click', (e) => {
        if(e.target === notifOverlay) tutupNotif();
    });

    // DATABASE SISWA
    const dataSiswa = {
        "10A": ["Abiyu Daffa Khalfan", "Aisyah Irbah Zein", "Alfazari Munjiyat", "Alfiraqa ryeva", "Ayasha Yasmin Zakiah", "Azwa Azzahra", "Fadhil Putra Andriko", "Farid Ijmali Siregar", "Hajra Hayatun Nufus", "Hamid Assyadikhi", "Khansa Amira Ilmuna", "Khanza Hidayatul Khutsi", "Maharanie", "Muhammad Al-Faruq Tanjung", "Muhammad Ikhwan Maulana", "Nabil Tsany Latif", "Najwatul Jannah", "Nashra Hamdani", "Perina Putri Naima", "Rafael Alfatir Laska", "Rafiq Kesuma Agung", "Raisya Restu Putri", "Raisyah Putri Amirah Ritonga", "Tsabitah Hanin Sitompul"],
        "10B": ["Adifa Ayra Hermanda", "Aisyah Altafunnisa", "Anandya Rahmanissa Cintakami", "Anis Fatih Assahiddiq", "Dafafahd Varen", "Fachri Arrasyid", "Fauzul Sidiq", "Galih Farras Hazim", "Gayatri Puti Mahadewi", "Ghina Adhelia", "Hafizhah Salwa Azwar", "Haifa Faras Mulya", "Irsyadi Yusuf Ashiddiqie", "Lathifatul Arifa", "Muhammad Aiman Afif", "Muhammad Daffa", "Muhammad Rafi Riadi", "Muhammad Rafli Afant Arrayyan", "Muhammad Zidan Wali", "Naura Fauzhara Putri", "Prita Cemasari", "Puti Nazhira Maylatussyahda", "Sarah Fauziah", "Zahri Atha Lutfi"],
        "10C": ["Ahmad Rafi Alkindi", "Alyvia Rahmatul Ulya", "Amanda Sahira Ramadhani", "Azizah Siti Humairha", "Cheisy Wahyuni", "Fadhel Mohammed Ikhwin", "Faithulkhaliv Mahdhivan", "Ghaida Khayyira Huraiyah", "Habib Al Ghani", "Hanifatul Lathifah", "Ikramul Hudaya", "Jingga Rahmiana Noeris", "Khalila Assyifa Jahidin", "Muhammad Adhim Pilica", "Muhammad Almisky Ferdi", "Nadhif Faitulharith", "Nafila Aini", "Najla Arifah Salwa", "Quinara Septilia Shawna", "Ridhan Hafizhi Al Azam", "Rifdi Hasan", "Sauqi Adelio Efendi", "Syabib Zhafran Dakhilullah", "Zahratul Lathifah"],
        "10D": ["Ahmad Haziq", "Ahmad Waliyyu Rozak", "Alifa Adya Fitri", "Alya Nadhirah", "Aulia Safira Adha", "Bambang Hermawan Raina", "Faizah Hilmi Redesti", "Farell Mulia Putra", "Genta Putra Bumi", "Givani Audia Junika", "Halil Rahagi Thamra", "Himmah Raudhatul Jannah", "Muhammad Al-Ghiffari Aidira", "Muhammad Asyad Alfadh", "Muhammad Habil Rinandy", "Mulyasari Dwi Putri", "Nadira Assyifa", "Najwa Khairunnaimah", "Radhit Almahdi", "Said Aqil Rahmat", "Siti Habibah", "Syifa Alfahira", "Wafi Bisa'adah", "Zaid Fadhlurrahman"],
        "10E": ["Ahmad Syathir", "Annaufal Arsiga", "Azzahra Fakhira Aryani", "Brilliant Malik Duandra Fransisco", "Emir Fayyadhi", "Farel Paslazuwa", "Kamela Mahera Harahap", "Khalisha Rahmadhani", "Khaliza Fajrina", "Kindi Ziyad", "M. Irzal Hamid", "Muhammad Bonardo Lubis", "Muhammad Daffa Khalfani", "Muhammad Fauzan Hidayat", "Muhammad Syathir Al Azhar", "Nabilah", "Naila Khairiyah", "Naila Nafila", "Nazhifa Anantia Ramon", "Neysa Khansa Amira", "Putri Infi Salma", "Queenzhia Kastadinata", "Thahira Alva Zafirah", "Zulazmi Rahman"]
    };

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwno1JY1AZR3ToJFteySnjvuQiw9mFt8egM_I1hMHMgX-Dy-cPnEt79dJ3MFC-KjQg/exec"; 
    const NO_ADMIN = "62895402410873";

    function updateSiswa() {
        const kelasSelect = document.getElementById('kelas');
        const namaSelect = document.getElementById('nama');
        const kelasPilihan = kelasSelect.value;
        namaSelect.innerHTML = '<option value="">-- Pilih Nama --</option>';
        if (kelasPilihan !== "") {
            const listSiswa = dataSiswa[kelasPilihan];
            listSiswa.forEach(function(nama) {
                let opt = document.createElement('option');
                opt.value = nama;
                opt.innerHTML = nama;
                namaSelect.appendChild(opt);
            });
            namaSelect.disabled = false;
        } else {
            namaSelect.disabled = true;
        }
    }

    function hitungTotal() {
        const harga = parseInt(document.getElementById('jenis').value);
        const hal = parseInt(document.getElementById('hal').value) || 1;
        const copy = parseInt(document.getElementById('copy').value) || 1;
        const total = harga * hal * copy;
        document.getElementById('totalTampilan').innerText = "Rp " + total.toLocaleString('id-ID');
        return total;
    }

    function prosesOrder() {
        const fileInput = document.getElementById('fileInput');
        const nama = document.getElementById('nama').value;
        const kelas = document.getElementById('kelas').value;

        if (!kelas || !nama || fileInput.files.length === 0) {
            alert("Lengkapi data: Kelas, Nama, dan File!");
            return;
        }

        document.getElementById('loading').style.display = "block";
        document.getElementById('btnSubmit').disabled = true;

        const file = fileInput.files[0];
        const reader = new FileReader();
        
        reader.onload = function(e) {
            const payload = {
                file: e.target.result,
                filename: file.name,
                nama: nama,
                kelas: kelas,
                jenis: document.getElementById('jenis').options[document.getElementById('jenis').selectedIndex].text,
                halaman: document.getElementById('hal').value,
                rangkap: document.getElementById('copy').value,
                total: document.getElementById('totalTampilan').innerText
            };

            fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(data => {
                if(data.result === "success") {
                    const pesan = `Halo Admin, saya mau order print.%0A%0A` +
                                  `👤 Nama: *${nama}*%0A` +
                                  `🏫 Kelas: *${kelas}*%0A` +
                                  `📄 File: *${data.newFileName}*%0A` +
                                  `⚙️ Detail: ${payload.jenis} (${payload.halaman} hal x ${payload.rangkap} rangkap)%0A` +
                                  `💰 Total: *${payload.total}*`;
                    
                    window.location.href = `https://wa.me/${NO_ADMIN}?text=${pesan}`;
                } else {
                    alert("Error: " + data.error);
                    resetStatus();
                }
            })
            .catch(err => {
                alert("Gagal terhubung ke server.");
                resetStatus();
            });
        };
        reader.readAsDataURL(file);
    }

    function resetStatus() {
        document.getElementById('loading').style.display = "none";
        document.getElementById('btnSubmit').disabled = false;
    }
</script>

</body>
</html>
